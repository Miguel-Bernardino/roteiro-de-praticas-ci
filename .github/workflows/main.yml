name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-job:            # Nome do Job (Equivalente ao nome do bloco no GitLab)
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "This job tests something"
  test-job2:
    runs-on: ubuntu-latest

    steps:

    - name: Qualquer Coisa
      run: echo "Qualquer coisa"

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        [cite_start]python-version: '3.11' # Conforme requisito do roteiro [cite: 29]

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask coverage [cite: 96, 120]

