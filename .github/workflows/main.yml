name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Saudação
        run: echo "Olá, $GITHUB_ACTOR! Iniciando o build..."

  test-job:
    runs-on: ubuntu-latest
    needs: build-job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flask coverage

      - name: Run tests with coverage
        run: |
          python -m coverage run -m unittest -v tests/appTest.py 
          python -m coverage report 

  deploy-prod-job:
    runs-on: ubuntu-latest
    environment: 
      name: production
    steps:
      - name: Implantando
        run: |
          echo "Implantando a branch ${{ github.ref_name }} em produção..."
          sleep 20
          echo "Implantação concluída com sucesso!"